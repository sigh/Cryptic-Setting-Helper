<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cryptic Setting Helper</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/app.css">
  <script defer src="js/search.js"></script>
  <script defer src="js/page.js"></script>
  <script>
    window.addEventListener('load', () => { initPage(); });
  </script>
</head>

<body>
  <div id="app">
    <div id="header">
      <h1>Cryptic Setting Helper</h1>
      <p>Find words by pattern or anagram, ranked by frequency</p>
    </div>

    <form id="search-form">
      <div id="search-row">
        <input id="search-input" type="text" placeholder="e.g. C??T or EART" autocomplete="off" spellcheck="false">
      </div>
      <div id="search-options">
        <div id="mode-toggles"></div>
        <span class="hint"><code>?</code> = one letter &middot; <code>*</code> = any letters &middot; <code>[abc]</code> = one of</span>
      </div>
    </form>

    <div id="status"></div>
    <div id="results"></div>
  </div>
</body>

</html>
